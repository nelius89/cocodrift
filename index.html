<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SUP App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ─────────────────────────────────────────
       VIEW: HOME — Selección de playa
  ───────────────────────────────────────── -->
  <div id="view-home" class="view view--home active">

    <div class="home__top">
      <div class="home-anim">
        <img class="home-anim__frame home-anim__frame--1" src="assets/illustrations/FR1.png" alt="">
        <img class="home-anim__frame home-anim__frame--2" src="assets/illustrations/FR2.png" alt="">
        <img class="home-anim__frame home-anim__frame--3" src="assets/illustrations/FR-3.png" alt="">
      </div>
    </div>

    <div class="home__spots">
      <!-- Spots + botón añadir en grid 2 columnas — renderizado por JS -->
      <div class="spots-row" id="spots-row"></div>
    </div>

  </div>


  <!-- ─────────────────────────────────────────
       VIEW: RESULTS — Diagnóstico
  ───────────────────────────────────────── -->
  <div id="view-results" class="view view--results">

    <header class="results__header">
      <button class="btn-back" id="btn-back">←</button>
      <span class="results__spot-name" id="results-spot-name">Pont del Petroli</span>
    </header>

    <div class="results__main">

      <!-- Capa 2: Alerta offshore -->
      <div class="offshore-alert hidden" id="offshore-alert">
        <div class="illus-placeholder illus-placeholder--offshore"></div>
        <p>
          <strong>Ojo al viento terral</strong> — El viento sopla de tierra hacia el mar.
          El agua parece en calma, pero te puede arrastrar lejos sin darte cuenta.
          Si sales, no te alejes de la orilla.
        </p>
      </div>

      <!-- Capa 1: Diagnóstico principal -->
      <div class="diagnosis">
        <div class="illus-placeholder illus-placeholder--results" id="diagnosis-illus"></div>
        <h1 class="diagnosis__title" id="diagnosis-title">Cargando...</h1>
        <p class="diagnosis__desc" id="diagnosis-desc"></p>
      </div>

      <!-- Capa 3: Drum de métricas — generado por WheelPicker -->
      <div class="metrics-drum" id="metrics-drum"></div>

    </div><!-- /results__main -->

    <!-- Barra temporal -->
    <div class="time-bar">
      <input
        type="range"
        class="time-slider"
        id="time-slider"
        min="0"
        max="48"
        value="0"
      >
      <div class="time-bar__label" id="time-bar-label">Hoy · Mañana</div>
    </div>

  </div>


  <!-- ─────────────────────────────────────────
       SEARCH SCREEN: Añadir playa
  ───────────────────────────────────────── -->
  <div id="search-screen" class="search-screen">
    <div class="search-screen__inner">

      <button class="search-back" id="search-back">←</button>

      <p class="search-prompt">¿Dónde quieres ir?</p>

      <div class="search-field-wrap">
        <input
          type="text"
          id="search-input"
          class="search-field"
          placeholder="Escribe una playa..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
      </div>

      <ul id="search-results" class="search-results"></ul>

      <div id="search-confirm" class="search-confirm hidden">
        <input
          type="text"
          id="spot-name-input"
          class="search-field search-field--sm"
          placeholder="Nombre para este spot"
        >
        <button id="btn-save-spot" class="search-save-btn">Guardar</button>
      </div>

    </div>
  </div>


  <script src="js/storage.js"></script>
  <script src="js/score.js"></script>
  <script src="js/api.js"></script>
  <script src="js/wheel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
